<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>수석의방 — 스스로 공부하는 힘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Playfair+Display:wght@500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg-white: #fff;
      --text-primary: #222;
      --text-secondary: #777;
      --text-tertiary: #aaa;
      --brand: #5b3a7a;
      --brand-light: #f3eef8;
      --brand-dark: #3d2258;
      --brand-dim: rgba(91, 58, 122, .12);
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, .04);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, .06);
      --shadow-book: 0 4px 16px rgba(0, 0, 0, .1), 0 2px 4px rgba(0, 0, 0, .04);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-book: 3px 8px 8px 3px
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased
    }

    body {
      font-family: 'Apple SD Gothic Neo', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
      color: var(--text-primary);
      background: var(--bg-white);
      overflow-x: hidden;
      min-height: 100vh;
      padding-bottom: 60px
    }

    /* ═══ BULLETIN BOARD ═══ */
    .bulletin-board {
      background: linear-gradient(180deg, #fff 0%, #fff 70%, #f0f2f5 100%);
      padding: 0;
      position: relative;
      overflow: hidden;
      height: calc(100vh - 120px);
      min-height: 500px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .1), 0 2px 6px rgba(0, 0, 0, .05)
    }

    .bb-carousel {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden
    }

    .bb-slides {
      display: flex;
      transition: transform .5s cubic-bezier(.4, 0, .2, 1);
      width: 500%;
      height: 100%
    }

    .bb-slide {
      width: 20%;
      flex-shrink: 0;
      padding: clamp(20px, 4vw, 36px) clamp(16px, 4vw, 40px) clamp(16px, 3vw, 28px);
      overflow: hidden;
      height: 100%;
      display: flex;
      flex-direction: column
    }

    .bb-slide-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: clamp(16px, 2.5vw, 26px)
    }

    .bb-slide-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-weight: 700;
      font-size: clamp(28px, 4.5vw, 42px);
      color: var(--text-primary);
      letter-spacing: -.5px
    }

    .bb-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 12px 0 14px
    }

    .bb-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(0, 0, 0, .18);
      border: none;
      cursor: pointer;
      transition: all .3s;
      padding: 0
    }

    .bb-dot.active {
      background: var(--brand);
      width: 20px;
      border-radius: 4px
    }

    .bb-nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255, 255, 255, .85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 0, 0, .08);
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s
    }

    .bb-nav-btn:hover {
      background: #fff;
      box-shadow: 0 4px 14px rgba(0, 0, 0, .12)
    }

    .bb-nav-btn svg {
      width: 16px;
      height: 16px;
      stroke: #555;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .bb-nav-prev {
      left: 12px
    }

    .bb-nav-next {
      right: 12px
    }

    /* Planner */
    .planner-week {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden
    }

    .planner-week-header {
      display: grid;
      grid-template-columns: 44px repeat(7, 1fr);
      border-bottom: 1.5px solid rgba(0, 0, 0, .1)
    }

    .planner-day-label {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: #888;
      padding: 6px 0
    }

    .planner-day-label.today {
      color: var(--brand)
    }

    .planner-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none
    }

    .planner-body::-webkit-scrollbar {
      display: none
    }

    .planner-row {
      display: grid;
      grid-template-columns: 44px repeat(7, 1fr);
      border-bottom: 1px solid rgba(0, 0, 0, .05);
      min-height: 48px
    }

    .planner-time {
      font-size: 10px;
      color: #999;
      font-variant-numeric: tabular-nums;
      padding: 8px 6px 0 0;
      text-align: right;
      line-height: 1
    }

    .planner-time.current {
      color: var(--brand);
      font-weight: 700
    }

    .planner-cell {
      padding: 4px 3px;
      display: flex;
      align-items: stretch;
      justify-content: center
    }

    .planner-cell.current-cell {
      background: var(--brand-dim);
      outline: 1.5px solid var(--brand);
      outline-offset: -1.5px;
      border-radius: 4px;
      z-index: 2
    }

    .plan-block {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 38px;
      padding: 3px 4px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center
    }

    .plan-block.math {
      background: rgba(26, 107, 181, .12);
      color: #1a6bb5
    }

    .plan-block.eng {
      background: rgba(199, 43, 106, .12);
      color: #c72b6a
    }

    .plan-block.sci {
      background: rgba(30, 125, 75, .12);
      color: #1e7d4b
    }

    .plan-block.read {
      background: rgba(196, 95, 0, .12);
      color: #c45f00
    }

    /* Ongoing */
    .ongoing-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
      width: 100%;
      min-height: 0
    }

    .book-spread {
      display: flex;
      aspect-ratio: 1.4/1;
      height: 100%;
      max-height: 520px;
      width: auto;
      max-width: 100%;
      background: #4a3b32;
      border-radius: 4px;
      padding: 4px 6px 6px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, .25), inset 0 1px 0 rgba(255, 255, 255, .1);
      position: relative
    }

    .book-spread::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: rgba(0, 0, 0, .4);
      z-index: 10;
      transform: translateX(-50%)
    }

    .bs-page {
      flex: 1;
      width: 50%;
      background: #f8f6f0;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    .bs-page-left {
      border-radius: 2px 0 0 2px;
      box-shadow: inset -15px 0 20px -15px rgba(0, 0, 0, .25)
    }

    .bs-page-right {
      border-radius: 0 2px 2px 0;
      box-shadow: inset 15px 0 20px -15px rgba(0, 0, 0, .25)
    }

    .bs-left-content {
      margin: auto;
      text-align: center
    }

    .bs-gold-line {
      width: 24px;
      height: 1.5px;
      background: #c2a878;
      margin: 0 auto 16px
    }

    .bs-category {
      font-size: 11px;
      color: #999;
      letter-spacing: .5px;
      margin-bottom: 8px
    }

    .bs-title {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 700;
      font-size: clamp(20px, 3.5vw, 26px);
      color: #4a3b32;
      margin-bottom: 24px
    }

    .bs-copyright {
      font-size: 10px;
      color: #bbb
    }

    .bs-right-top {
      text-align: right;
      font-size: 9px;
      color: #aaa;
      padding: 24px 24px 0
    }

    .bs-right-content {
      padding: 16px clamp(16px, 3vw, 32px);
      flex: 1;
      display: flex;
      flex-direction: column
    }

    .bs-h1 {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 700;
      font-size: clamp(15px, 2.5vw, 19px);
      color: #a88a4a;
      margin-bottom: 16px;
      display: inline-block;
      border-bottom: 2px solid #e0d0a0;
      padding-bottom: 4px;
      align-self: flex-start
    }

    .bs-paragraph {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-size: clamp(11px, 1.8vw, 14px);
      color: #555;
      line-height: 1.8;
      margin-bottom: 14px;
      word-break: keep-all
    }

    .bs-highlight {
      background: rgba(194, 168, 120, .2);
      padding: 0 4px;
      border-radius: 2px
    }

    .bs-form-box {
      background: #fff;
      border: 1px solid #e8e2d8;
      border-radius: 8px;
      padding: 16px;
      margin-top: 10px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .02)
    }

    .bs-form-title {
      font-weight: 600;
      font-size: 12px;
      color: #9e7f42;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .bs-form-title .icon {
      background: #c2a878;
      color: #fff;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 3px;
      font-size: 9px
    }

    .bs-form-line {
      border-bottom: 1px dashed #e0d8cc;
      padding: 8px 0;
      font-size: 12px;
      color: #ccc;
      font-style: italic
    }

    /* Homework */
    .homework-scroll {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      overflow-x: auto;
      padding: 10px;
      scrollbar-width: none;
      flex-wrap: nowrap
    }

    .homework-scroll::-webkit-scrollbar {
      display: none
    }

    .hw-book {
      flex: 0 0 clamp(160px, 28vw, 220px);
      cursor: pointer;
      transition: transform .25s
    }

    .hw-book:hover {
      transform: translateY(-5px) scale(1.02)
    }

    .hw-book-cover {
      width: 100%;
      aspect-ratio: 3/4.2;
      border-radius: var(--radius-book);
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .18), 0 2px 6px rgba(0, 0, 0, .08)
    }

    .hw-book-cover::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 14px;
      background: linear-gradient(90deg, rgba(0, 0, 0, .25) 0%, rgba(0, 0, 0, .12) 15%, rgba(255, 255, 255, .15) 20%, rgba(255, 255, 255, .05) 26%, rgba(0, 0, 0, .04) 38%, transparent 100%);
      z-index: 3
    }

    .hw-book-cover::after {
      content: '';
      position: absolute;
      right: 0;
      top: 3px;
      bottom: 3px;
      width: 3px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .4), rgba(255, 255, 255, .15));
      border-radius: 0 2px 2px 0;
      z-index: 3
    }

    .hw-cover-bg {
      position: absolute;
      inset: 0;
      z-index: 1
    }

    .hw-cover-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .18) 0%, rgba(255, 255, 255, .06) 30%, transparent 55%, rgba(0, 0, 0, .04) 100%);
      z-index: 2;
      pointer-events: none
    }

    .hw-inner-border {
      position: absolute;
      inset: 8px 7px;
      border: 1px solid rgba(255, 220, 120, .35);
      border-radius: 1px;
      z-index: 4;
      pointer-events: none
    }

    .hw-cover-title {
      font-weight: 700;
      font-size: clamp(16px, 2.5vw, 20px);
      color: #fff;
      line-height: 1.35;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .45)
    }

    .hw-cover-subtitle {
      font-size: clamp(11px, 1.5vw, 13px);
      color: rgba(255, 255, 255, .8);
      margin-top: 8px
    }

    .hw-cover-sci {
      background: linear-gradient(180deg, #2e5040 0%, #1a3428 60%, #0e2018 100%)
    }

    .hw-cover-eng {
      background: linear-gradient(180deg, #2a4060 0%, #162838 60%, #0a1820 100%)
    }

    .hw-cover-read {
      background: linear-gradient(180deg, #4a2a50 0%, #301838 60%, #1e0e24 100%)
    }

    .hw-cover-plan {
      background: linear-gradient(180deg, #2e4868 0%, #1a3048 60%, #0e1c2e 100%)
    }

    /* ═══ PROGRAM SECTIONS ═══ */
    .programs-section {
      background: linear-gradient(180deg, #fff 0%, #fff 70%, #f0f2f5 100%);
      padding: clamp(44px, 6vw, 68px) clamp(16px, 4vw, 40px) clamp(40px, 5vw, 56px);
      position: relative;
      z-index: 1;
      overflow: visible
    }

    /* Bottom edge shadow that darkens upward */
    .programs-section::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, .06));
      pointer-events: none
    }

    #sec-diag::after {
      display: none
    }

    .program-header {
      margin-bottom: 32px
    }

    .program-title {
      font-weight: 800;
      font-size: clamp(24px, 3.5vw, 32px);
      color: var(--text-primary);
      letter-spacing: -.5px
    }

    .program-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 6px
    }

    .program-scroll {
      display: flex;
      gap: clamp(14px, 2.5vw, 22px);
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 6px 4px 36px;
      scrollbar-width: none;
      overflow-y: visible
    }

    .program-scroll::-webkit-scrollbar {
      display: none
    }

    /* Book item */
    .book-item {
      flex: 0 0 auto;
      width: clamp(160px, 28vw, 220px);
      scroll-snap-align: start;
      cursor: pointer;
      transition: transform .25s ease;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      z-index: 2
    }

    .book-item:hover {
      transform: translateY(-8px) scale(1.03);
      z-index: 10
    }

    .book-cover {
      width: 100%;
      aspect-ratio: 3/4.2;
      border-radius: var(--radius-book);
      position: relative;
      overflow: visible
    }

    .book-cover-iw {
      width: 100%;
      height: 100%;
      border-radius: var(--radius-book);
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08), 0 4px 16px rgba(0, 0, 0, .06);
      transition: box-shadow .25s ease
    }

    .book-item:hover .book-cover-iw {
      box-shadow: 0 8px 28px rgba(0, 0, 0, .12), 0 4px 10px rgba(0, 0, 0, .06)
    }

    .book-cover-iw::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 16px;
      background: linear-gradient(90deg, rgba(0, 0, 0, .28) 0%, rgba(0, 0, 0, .15) 15%, rgba(255, 255, 255, .12) 20%, rgba(255, 255, 255, .05) 26%, rgba(0, 0, 0, .06) 35%, rgba(0, 0, 0, .02) 55%, transparent 100%);
      z-index: 5
    }

    .book-cover-iw::after {
      content: '';
      position: absolute;
      right: 0;
      top: 3px;
      bottom: 3px;
      width: 3px;
      background: linear-gradient(90deg, #e8e4de, #f5f1eb, #e0dcd6);
      border-radius: 0 2px 2px 0;
      z-index: 4
    }

    .book-cover-shine {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .13) 0%, rgba(255, 255, 255, .04) 25%, transparent 50%, rgba(0, 0, 0, .02) 100%);
      z-index: 3;
      pointer-events: none
    }

    .book-cover-bg {
      position: absolute;
      inset: 0;
      z-index: 1
    }

    .book-cover-inner-border {
      position: absolute;
      inset: 8px 7px;
      border: 1px solid rgba(255, 220, 120, .35);
      border-radius: 1px;
      z-index: 4;
      pointer-events: none
    }

    .bc-text {
      position: absolute;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 5
    }

    .bc-top {
      top: 32px
    }

    .bc-bot {
      bottom: 32px
    }

    .book-cover-title {
      font-weight: 700;
      font-size: clamp(17px, 2.5vw, 22px);
      color: #fff;
      line-height: 1.35;
      text-shadow: 0 2px 6px rgba(0, 0, 0, .45);
      letter-spacing: -.2px;
      word-break: keep-all
    }

    .book-cover-cat {
      font-size: clamp(10px, 1.4vw, 13px);
      color: rgba(255, 255, 255, .55);
      font-weight: 400;
      margin-top: 8px;
      letter-spacing: .4px
    }

    .book-label {
      margin-top: 12px;
      padding: 0 2px
    }

    .book-label-title {
      font-weight: 600;
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.3
    }

    .book-label-sub {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 1px
    }

    /* Cover colors */
    .cover-s1 {
      background: linear-gradient(180deg, #2e5040 0%, #1a3428 60%, #0e2018 100%)
    }

    .cover-s2 {
      background: linear-gradient(180deg, #3a5a3a 0%, #243a22 60%, #152014 100%)
    }

    .cover-s3 {
      background: linear-gradient(180deg, #2a4a38 0%, #183020 60%, #0c1c10 100%)
    }

    .cover-s4 {
      background: linear-gradient(180deg, #3c5c44 0%, #264030 60%, #162818 100%)
    }

    .cover-s5 {
      background: linear-gradient(180deg, #344e3c 0%, #1e3424 60%, #102014 100%)
    }

    .cover-m1 {
      background: linear-gradient(180deg, #4a2a50 0%, #301838 60%, #1e0e24 100%)
    }

    .cover-m2 {
      background: linear-gradient(180deg, #5a2840 0%, #3e1828 60%, #280e18 100%)
    }

    .cover-h1 {
      background: linear-gradient(180deg, #6b4a30 0%, #4a3018 60%, #2e1c0c 100%)
    }

    .cover-h2 {
      background: linear-gradient(180deg, #5a4028 0%, #3e2a16 60%, #28180a 100%)
    }

    .cover-h3 {
      background: linear-gradient(180deg, #704e34 0%, #4e3420 60%, #30200e 100%)
    }

    .cover-h4 {
      background: linear-gradient(180deg, #604228 0%, #422c14 60%, #2a1a08 100%)
    }

    .cover-h5 {
      background: linear-gradient(180deg, #5e4830 0%, #40301c 60%, #261c0c 100%)
    }

    .cover-h6 {
      background: linear-gradient(180deg, #6a4e38 0%, #4c3422 60%, #2c1e10 100%)
    }

    .cover-h7 {
      background: linear-gradient(180deg, #584028 0%, #3c2a14 60%, #221808 100%)
    }

    .cover-t1 {
      background: linear-gradient(180deg, #5a2838 0%, #3e1824 60%, #280e16 100%)
    }

    .cover-d1 {
      background: linear-gradient(180deg, #3a3a40 0%, #262628 60%, #141416 100%)
    }

    .cover-d2 {
      background: linear-gradient(180deg, #404048 0%, #2a2a30 60%, #18181c 100%)
    }

    .cover-d3 {
      background: linear-gradient(180deg, #383840 0%, #242428 60%, #121214 100%)
    }

    .cover-d4 {
      background: linear-gradient(180deg, #3c3c44 0%, #28282e 60%, #161618 100%)
    }

    .cover-d5 {
      background: linear-gradient(180deg, #343438 0%, #222224 60%, #101012 100%)
    }

    .cover-d6 {
      background: linear-gradient(180deg, #3e3e46 0%, #2c2c32 60%, #1a1a1e 100%)
    }

    /* White covers */
    .cover-white .book-cover-iw {
      box-shadow: 0 2px 8px rgba(0, 0, 0, .08), 0 4px 16px rgba(0, 0, 0, .06), 0 0 0 1px rgba(91, 58, 122, .15)
    }

    .book-item:hover .cover-white .book-cover-iw {
      box-shadow: 0 8px 28px rgba(0, 0, 0, .12), 0 4px 10px rgba(0, 0, 0, .06), 0 0 0 1px rgba(91, 58, 122, .25)
    }

    .cover-white .book-cover-iw::before {
      background: linear-gradient(90deg, rgba(0, 0, 0, .10) 0%, rgba(0, 0, 0, .06) 15%, rgba(0, 0, 0, .02) 20%, rgba(255, 255, 255, .3) 22%, rgba(0, 0, 0, .03) 30%, transparent 100%)
    }

    .cover-white .book-cover-iw::after {
      background: linear-gradient(90deg, #ddd, #eee, #ddd);
      box-shadow: 1px 0 2px rgba(0, 0, 0, .04)
    }

    .white-jamo {
      font-family: 'Noto Serif KR', Georgia, serif;
      font-weight: 700;
      font-size: clamp(56px, 10vw, 80px);
      line-height: 1;
      margin-top: clamp(8px, 1.5vw, 14px);
      color: var(--brand-dark)
    }

    .white-sub {
      font-size: clamp(15px, 2.2vw, 19px);
      color: #444;
      margin-top: 8px;
      letter-spacing: -.1px;
      font-weight: 600
    }

    /* ═══ CHAT PANEL ═══ */

      display: flex;
      width: 100%;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden

    .chat-panel {
      width: 320px;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      height: 100vh;
      padding-bottom: calc(64px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      background: #fafafa;

      transition: transform .3s cubic-bezier(.2, .8, .2, 1)

    .chat-panel.collapsed {
      transform: translateX(-100%)

    @media(min-width:769px) {
      .bulletin-board {
        margin-left: 320px;
        transition: margin-left .3s cubic-bezier(.2, .8, .2, 1)

      body.chat-collapsed .bulletin-board {
        margin-left: 0
      }
    }

    .chat-panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(0, 0, 0, .06);
      display: flex;
      align-items: center;
      justify-content: space-between

    .chat-panel-left {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .chat-panel-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid var(--brand-light)

    .chat-panel-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary)
    }

    .chat-collapse-btn {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      background: rgba(0, 0, 0, .04);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s
    }

    .chat-collapse-btn:hover {
      background: rgba(0, 0, 0, .08)
    }

    .chat-collapse-btn svg {
      width: 16px;
      height: 16px;
      stroke: #888;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .chat-bookmark {
      position: fixed;
      left: 0;
      top: 18%;
      width: 18px;
      height: 52px;
      background: var(--brand);
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      z-index: 99;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 2px 0 6px rgba(0, 0, 0, .08);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s
    }

    body.chat-collapsed .chat-bookmark {
      opacity: 1;
      pointer-events: auto
    }

    .chat-bookmark svg {
      width: 12px;
      height: 12px;
      stroke: #fff;
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .ai-chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: none
    }

    .ai-chat-area::-webkit-scrollbar {
      display: none
    }

    .ai-bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6
    }

    .ai-bubble.ai {
      background: #f0f0f0;
      border-radius: 4px 16px 16px 16px;
      align-self: flex-start;
      color: #333
    }

    .ai-bubble.user {
      background: var(--brand);
      color: #fff;
      border-radius: 16px 4px 16px 16px;
      align-self: flex-end
    }

    .ai-input-row {
      padding: 10px 14px;
      border-top: 1px solid rgba(0, 0, 0, .06);
      display: flex;
      gap: 8px;
      align-items: center
    }

    .ai-input {
      flex: 1;
      border: 1px solid #e0e0e0;
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      background: #fff
    }

    .ai-input:focus {
      border-color: var(--brand)
    }

    .ai-send-btn {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--brand);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .ai-send-btn:hover {
      background: var(--brand-dark)
    }

    .ai-send-btn svg {
      width: 16px;
      height: 16px;
      fill: #fff
    }

    .content-area {
      flex: 1;
      min-width: 0;
      margin-left: 320px;
      transition: margin-left .3s cubic-bezier(.2, .8, .2, 1)
    }

    body.chat-collapsed .content-area {
      margin-left: 0
    }

    /* Timer */
    .timer-section {
      padding: clamp(44px, 6vw, 68px) clamp(16px, 4vw, 40px);
      background: linear-gradient(180deg, #fff 0%, #fff 70%, #f0f2f5 100%);
      text-align: center;
      position: relative
    }

    .timer-section::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 20px;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, .06));
      pointer-events: none
    }

    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px
    }

    .timer-svg {
      width: 200px;
      height: 200px
    }

    .timer-bg {
      fill: none;
      stroke: #eee;
      stroke-width: 8
    }

    .timer-progress {
      fill: none;
      stroke: var(--brand);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear;
      transform: rotate(-90deg);
      transform-origin: center
    }

    .timer-progress.rest {
      stroke: #e8a838
    }

    .timer-text {
      font-size: 26px;
      font-weight: 700;
      fill: var(--text-primary);
      font-family: 'Playfair Display', serif
    }

    .timer-label-txt {
      font-size: 8.5px;
      fill: var(--text-secondary);
      font-weight: 500
    }

    .timer-controls {
      display: flex;
      gap: 12px
    }

    .timer-btn {
      padding: 10px 28px;
      border-radius: 24px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit
    }

    .timer-btn.start {
      background: var(--brand);
      color: #fff
    }

    .timer-btn.start:hover {
      background: var(--brand-dark)
    }

    .timer-btn.reset {
      background: #f0f0f0;
      color: #666
    }

    .timer-btn.reset:hover {
      background: #e0e0e0
    }

    .timer-mode {
      font-size: 13px;
      font-weight: 600;
      color: var(--brand)
    }

    .timer-mode.rest-mode {
      color: #e8a838
    }

    /* Diagnostics */
    .diag-scroll {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding: 6px 0 20px;
      scrollbar-width: none
    }

    .diag-scroll::-webkit-scrollbar {
      display: none
    }

    .diag-card {
      flex: 0 0 280px;
      scroll-snap-align: start;
      background: #fff;
      border-radius: var(--radius-md);
      padding: 22px 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid rgba(0, 0, 0, .05);
      transition: box-shadow .3s, transform .3s;
      cursor: pointer
    }

    .diag-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px)
    }

    .diag-card-title {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      margin-bottom: 8px
    }

    .diag-card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.7;
      word-break: keep-all
    }

    .diag-card-tag {
      display: inline-block;
      margin-top: 12px;
      font-size: 10px;
      font-weight: 600;
      color: var(--brand);
      background: var(--brand-light);
      padding: 3px 10px;
      border-radius: 20px
    }

    /* Dock */
    .dock-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: rgba(255, 255, 255, .86);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-top: .5px solid rgba(0, 0, 0, .10);
      padding: 8px clamp(12px, 4vw, 40px) 10px;
      display: flex;
      align-items: flex-start;
      justify-content: space-around
    }

    .dock-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
      transition: transform .18s
    }

    .dock-item:hover {
      transform: translateY(-2px)
    }

    .dock-item:active {
      transform: scale(.95)
    }

    .dock-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .dock-icon svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #999;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round
    }

    .dock-item.active .dock-icon svg {
      stroke: var(--brand)
    }

    .dock-label {
      font-size: 9.5px;
      font-weight: 500;
      color: #aaa
    }

    .dock-item.active .dock-label {
      color: var(--brand);
      font-weight: 600
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(14px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .animate-in {
      animation: fadeInUp .5s ease both
    }

    .delay-1 {
      animation-delay: .1s
    }

    .delay-2 {
      animation-delay: .2s
    }

    .delay-3 {
      animation-delay: .3s
    }

    .delay-4 {
      animation-delay: .4s
    }

    /* Responsive */
    @media(max-width:768px) {
      .main-layout {
        flex-direction: column
      }

      .chat-panel {
        position: fixed;
        width: 100%;
        height: 100vh;
        z-index: 300;
        right: 0;
        padding-bottom: 0
      }

      .chat-panel.collapsed {
        transform: translateX(-100%)
      }

      body.chat-collapsed .chat-bookmark {
        z-index: 250
      }

      /* Mobile bookmark: 75% of desktop size */
      .chat-bookmark {
        width: 13px;
        height: 40px;
        border-radius: 0 5px 5px 0
      }

      .chat-bookmark svg {
        width: 9px;
        height: 9px
      }

      .content-area {
        width: 100%;
        margin-left: 0 !important
      }

      .bulletin-board {
        margin-left: 0 !important
      }

      .homework-scroll {
        flex-wrap: wrap;
        justify-content: center;
        gap: 16px;
        overflow-x: visible
      }

      .hw-book {
        flex: 0 0 calc(50% - 12px);
        max-width: 180px
      }

      .book-spread {
        aspect-ratio: 3/4
      }

      .bs-page-left {
        display: none
      }

      .bs-page-right {
        width: 100%;
        border-radius: 2px;
        box-shadow: none
      }

      .book-spread::after {
        display: none
      }

      /* Mobile chat: bigger everything */
      .ai-bubble {
        font-size: 17px;
        padding: 16px 20px;
        max-width: 88%;
        line-height: 1.7
      }

      .ai-input-row {
        padding: 10px 16px;
        gap: 0;
        justify-content: center;
        align-items: center;
        min-height: 52px
      }

      .ai-input {
        font-size: 17px;
        padding: 20px 60px 20px 24px;
        border-radius: 32px;
        flex: 1;
        max-width: calc(100% - 10px);
        line-height: 1.4
      }

      .ai-send-btn {
        width: 42px;
        height: 42px;
        margin-left: -52px;
        position: relative;
        z-index: 2
      }

      .ai-send-btn svg {
        width: 20px;
        height: 20px
      }

      .chat-panel-avatar {
        width: 42px;
        height: 42px
      }

      .chat-panel-title {
        font-size: 19px
      }

      .chat-panel-header {
        padding: 16px 18px
      }

      .chat-collapse-btn {
        width: 36px;
        height: 36px
      }

      .chat-collapse-btn svg {
        width: 20px;
        height: 20px
      }
    }

    @media(max-width:480px) {
      .book-item {
        width: 155px
      }

      .diag-card {
        flex: 0 0 240px
      }
    }

    @supports(padding-bottom:env(safe-area-inset-bottom)) {
      .dock-nav {
        padding-bottom: calc(8px + env(safe-area-inset-bottom))
      }

      body {
        padding-bottom: calc(60px + env(safe-area-inset-bottom))
      }
    }
  </style>
</head>

      // Now we have 5 slides: [clone-last, 0, 1, 2, clone-first]
      // Index 1 = real slide 0, index 2 = real slide 1, etc.
      let pos = 1; // start at real slide 0
      let animating = false;
      const sw = 20; // each slide is 20% of container
      function setPos(p, animate) {
        if (!animate) slides.style.transition = 'none';
        else slides.style.transition = 'transform .5s cubic-bezier(.4,0,.2,1)';

          else if (pos >= total + 1) { pos = 1; setPos(pos, false); }

      let greeted = false;

      function addB(t, r) { const b = document.createElement('div'); b.className = 'ai-bubble ' + r; b.textContent = t; ca.appendChild(b); ca.scrollTop = ca.scrollHeight; }
      if (window.innerWidth <= 768) setTimeout(greet, 600);

      const reps = ['좋은 자세네요! 계속해서 그렇게 해주세요.', '궁금한 점이 있으면 언제든 말해주세요.']; let ri = 0;
      function sendMsg() { const t = document.getElementById('aiInput').value.trim(); if (!t) return; addB(t, 'user'); document.getElementById('aiInput').value = ''; setTimeout(() => addB(reps[ri++ % reps.length], 'ai'), 700); }
      document.getElementById('aiSendBtn').addEventListener('click', sendMsg);

      // Timer
      const W = 25 * 60, R = 5 * 60, C = 2 * Math.PI * 52; let tTot = W, tRem = W, tRun = false, tI = null, isR = false;
      const pr = document.getElementById('tP'), tt = document.getElementById('tT'), ml = document.getElementById('tML'), sb = document.getElementById('tS'), rb = document.getElementById('tR');
      function uT() { const m = Math.floor(tRem / 60), s = tRem % 60; tt.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s; pr.style.strokeDashoffset = C * (1 - tRem / tTot); }
      function tk() { tRem--; if (tRem < 0) { clearInterval(tI); tRun = false; if (!isR) { isR = true; tTot = R; tRem = R; ml.textContent = '휴식 시간'; ml.className = 'timer-mode rest-mode'; pr.classList.add('rest'); sb.textContent = '시작'; } else { isR = false; tTot = W; tRem = W; ml.textContent = '공부 시간'; ml.className = 'timer-mode'; pr.classList.remove('rest'); sb.textContent = '시작'; } } uT(); }

      rb.addEventListener('click', () => { clearInterval(tI); tRun = false; isR = false; tTot = W; tRem = W; ml.textContent = '공부 시간'; ml.className = 'timer-mode'; pr.classList.remove('rest'); sb.textContent = '시작'; uT(); });
      uT();
